<svg xmlns="http://www.w3.org/2000/svg" width="960" height="620" viewBox="0 0 960 620" font-family="Arial,Helvetica,sans-serif">

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1565C0"/>
    </marker>
    <marker id="arrGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2E7D32"/>
    </marker>
    <marker id="arrRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#C62828"/>
    </marker>
  </defs>

  <!-- ── Background ── -->
  <rect width="960" height="620" fill="#f9fafb" rx="10"/>
  <rect x="1" y="1" width="958" height="618" fill="none" stroke="#d0d7de" stroke-width="1.5" rx="10"/>

  <!-- ── Title ── -->
  <text x="480" y="30" font-size="15" font-weight="bold" text-anchor="middle" fill="#0d1117">AI Trading Bot — System Architecture</text>
  <text x="480" y="48" font-size="10.5" text-anchor="middle" fill="#57606a">Hyperliquid DEX (primary) · Paper / Testnet / Mainnet safety modes · AWS EC2 deployment</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- ROW 1 — Data pipeline (y ≈ 65)                            -->
  <!-- ═══════════════════════════════════════════════════════════ -->

  <!-- Market Data -->
  <rect x="18" y="65" width="128" height="62" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="82" y="86" font-size="11" font-weight="bold" text-anchor="middle" fill="#1e3a8a">Market Data</text>
  <text x="82" y="101" font-size="9.5" text-anchor="middle" fill="#1d4ed8">ccxt OHLCV</text>
  <text x="82" y="114" font-size="9.5" text-anchor="middle" fill="#1d4ed8">(public endpoints)</text>
  <!-- arrow → -->
  <line x1="146" y1="96" x2="175" y2="96" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Signal Writer -->
  <rect x="175" y="65" width="158" height="62" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="254" y="84" font-size="11" font-weight="bold" text-anchor="middle" fill="#14532d">live_writer.py</text>
  <text x="254" y="99" font-size="9.5" text-anchor="middle" fill="#166534">DL Ensemble · 4 models</text>
  <text x="254" y="113" font-size="9.5" text-anchor="middle" fill="#166534">27 features · 6 symbols</text>
  <!-- arrow → -->
  <line x1="333" y1="96" x2="362" y2="96" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Signals CSV -->
  <rect x="362" y="65" width="145" height="62" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="434" y="84" font-size="11" font-weight="bold" text-anchor="middle" fill="#713f12">live_signals.csv</text>
  <text x="434" y="99" font-size="9.5" text-anchor="middle" fill="#92400e">signal buffer</text>
  <text x="434" y="113" font-size="9.5" text-anchor="middle" fill="#92400e">p · rv · eff_thr · pass</text>
  <!-- arrow → -->
  <line x1="507" y1="96" x2="536" y2="96" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Executor -->
  <rect x="536" y="65" width="158" height="62" rx="6" fill="#fce7f3" stroke="#db2777" stroke-width="1.5"/>
  <text x="615" y="84" font-size="11" font-weight="bold" text-anchor="middle" fill="#831843">live_executor.py</text>
  <text x="615" y="99" font-size="9.5" text-anchor="middle" fill="#9d174d">risk gates · TP/SL</text>
  <text x="615" y="113" font-size="9.5" text-anchor="middle" fill="#9d174d">state · logging</text>
  <!-- dashed arrow ← from risk controls -->
  <line x1="800" y1="96" x2="695" y2="96" stroke="#7c3aed" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- V2 Risk Controls -->
  <rect x="800" y="65" width="145" height="62" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="872" y="84" font-size="11" font-weight="bold" text-anchor="middle" fill="#3730a3">v2/risk_controls</text>
  <text x="872" y="99" font-size="9.5" text-anchor="middle" fill="#4c1d95">daily SL/DD · time-stop</text>
  <text x="872" y="113" font-size="9.5" text-anchor="middle" fill="#4c1d95">pause-file kill switch</text>

  <!-- arrow ↓ executor → guardrail -->
  <line x1="615" y1="127" x2="615" y2="155" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- ROW 2 — Guardrail (y ≈ 155)                               -->
  <!-- ═══════════════════════════════════════════════════════════ -->

  <rect x="362" y="155" width="583" height="82" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="653" y="174" font-size="11" font-weight="bold" text-anchor="middle" fill="#7c2d12">runtime/guardrails.py — resolve_trading_mode()</text>
  <text x="653" y="188" font-size="9.5" text-anchor="middle" fill="#9a3412">Safe by default. Real money requires ALL confirmations or mode collapses to PAPER.</text>

  <!-- PAPER chip -->
  <rect x="380" y="196" width="150" height="30" rx="5" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
  <text x="455" y="216" font-size="11" font-weight="bold" text-anchor="middle" fill="#14532d">PAPER (default)</text>

  <!-- TESTNET_LIVE chip -->
  <rect x="548" y="196" width="150" height="30" rx="5" fill="#fef08a" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="623" y="216" font-size="11" font-weight="bold" text-anchor="middle" fill="#713f12">TESTNET_LIVE</text>

  <!-- MAINNET_LIVE chip -->
  <rect x="716" y="196" width="150" height="30" rx="5" fill="#fecaca" stroke="#dc2626" stroke-width="1.5"/>
  <text x="791" y="216" font-size="11" font-weight="bold" text-anchor="middle" fill="#7f1d1d">MAINNET_LIVE</text>

  <!-- arrow ↓ guardrail → factory -->
  <line x1="615" y1="237" x2="615" y2="265" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- ROW 3 — Exchange factory / adapters (y ≈ 265)             -->
  <!-- ═══════════════════════════════════════════════════════════ -->

  <rect x="362" y="265" width="583" height="98" rx="6" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="653" y="284" font-size="11" font-weight="bold" text-anchor="middle" fill="#1e3a8a">exchanges/factory.py</text>

  <!-- Hyperliquid adapter -->
  <rect x="380" y="291" width="256" height="58" rx="5" fill="#bfdbfe" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="508" y="311" font-size="11" font-weight="bold" text-anchor="middle" fill="#1e3a8a">hyperliquid_adapter.py</text>
  <text x="508" y="327" font-size="9.5" text-anchor="middle" fill="#1e40af">official SDK · agent wallet</text>
  <text x="508" y="341" font-size="9.5" text-anchor="middle" fill="#1e40af">PRIMARY (EXCHANGE=hyperliquid)</text>

  <!-- Bitget adapter -->
  <rect x="654" y="291" width="256" height="58" rx="5" fill="#e5e7eb" stroke="#6b7280" stroke-width="1.5"/>
  <text x="782" y="311" font-size="11" font-weight="bold" text-anchor="middle" fill="#374151">bitget_adapter.py</text>
  <text x="782" y="327" font-size="9.5" text-anchor="middle" fill="#4b5563">ccxt · legacy comparison</text>
  <text x="782" y="341" font-size="9.5" text-anchor="middle" fill="#4b5563">EXCHANGE=bitget</text>

  <!-- arrow ↓ HL adapter → Hyperliquid Exchange -->
  <line x1="508" y1="363" x2="508" y2="395" stroke="#1565C0" stroke-width="1.5" marker-end="url(#arrBlue)"/>

  <!-- Hyperliquid Exchange box -->
  <rect x="380" y="395" width="256" height="42" rx="5" fill="#1e3a8a" stroke="#1e40af" stroke-width="1.5"/>
  <text x="508" y="412" font-size="11" font-weight="bold" text-anchor="middle" fill="white">Hyperliquid DEX</text>
  <text x="508" y="428" font-size="9.5" text-anchor="middle" fill="#93c5fd">Testnet · Mainnet (perp futures)</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- LEFT COLUMN — Optional services (x ≈ 18–340)              -->
  <!-- ═══════════════════════════════════════════════════════════ -->

  <!-- Tier 2 Shadow -->
  <rect x="18" y="155" width="160" height="100" rx="6" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="98" y="175" font-size="11" font-weight="bold" text-anchor="middle" fill="#3730a3">Tier 2 Shadow</text>
  <text x="98" y="190" font-size="9.5" text-anchor="middle" fill="#4338ca">tier2/shadow_runner.py</text>
  <text x="98" y="204" font-size="9.5" text-anchor="middle" fill="#4338ca">Funding rate</text>
  <text x="98" y="218" font-size="9.5" text-anchor="middle" fill="#4338ca">Open interest</text>
  <text x="98" y="232" font-size="9.5" text-anchor="middle" fill="#4338ca">SQLite store (shadow only)</text>

  <!-- Telegram -->
  <rect x="192" y="155" width="155" height="100" rx="6" fill="#cffafe" stroke="#0891b2" stroke-width="1.5"/>
  <text x="269" y="175" font-size="11" font-weight="bold" text-anchor="middle" fill="#164e63">Telegram</text>
  <text x="269" y="190" font-size="9.5" text-anchor="middle" fill="#0e7490">telegram_notifier.py</text>
  <text x="269" y="204" font-size="9.5" text-anchor="middle" fill="#0e7490">telegram_controller.py</text>
  <text x="269" y="218" font-size="9.5" text-anchor="middle" fill="#0e7490">Alerts · pause / resume</text>
  <text x="269" y="232" font-size="9.5" text-anchor="middle" fill="#0e7490">emergency stop</text>

  <!-- Dashboard -->
  <rect x="18" y="270" width="330" height="78" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="183" y="290" font-size="11" font-weight="bold" text-anchor="middle" fill="#14532d">Flask Dashboard</text>
  <text x="183" y="305" font-size="9.5" text-anchor="middle" fill="#166534">tools/dashboard.py · dashboard_index.html</text>
  <text x="183" y="319" font-size="9.5" text-anchor="middle" fill="#166534">Positions · Signals · Trades · PnL (real-time)</text>
  <text x="183" y="333" font-size="9.5" font-weight="bold" text-anchor="middle" fill="#15803d">trading-bot.tradyai.live</text>

  <!-- AWS EC2 -->
  <rect x="18" y="363" width="330" height="74" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <text x="183" y="382" font-size="11" font-weight="bold" text-anchor="middle" fill="#7c2d12">AWS EC2 (Ubuntu)</text>
  <text x="183" y="397" font-size="9.5" text-anchor="middle" fill="#9a3412">systemd (hl-writer · hl-executor · hl-tier2 · hl-telegram)</text>
  <text x="183" y="411" font-size="9.5" text-anchor="middle" fill="#9a3412">Nginx · HTTPS · logrotate · .env (chmod 600)</text>
  <text x="183" y="425" font-size="9.5" text-anchor="middle" fill="#9a3412">github.com/Kvy202/Ai-Trading-Bot-HQ</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- LEGEND (y ≈ 455)                                           -->
  <!-- ═══════════════════════════════════════════════════════════ -->

  <rect x="18" y="455" width="924" height="148" rx="6" fill="white" stroke="#d0d7de" stroke-width="1"/>
  <text x="36" y="474" font-size="11" font-weight="bold" fill="#24292f">Key</text>

  <!-- Mode legend -->
  <rect x="36" y="482" width="14" height="14" rx="2" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.2"/>
  <text x="56" y="494" font-size="9.5" fill="#24292f">PAPER — default; no env changes needed</text>

  <rect x="240" y="482" width="14" height="14" rx="2" fill="#fef08a" stroke="#ca8a04" stroke-width="1.2"/>
  <text x="260" y="494" font-size="9.5" fill="#24292f">TESTNET_LIVE — LIVE_TRADING=true, PAPER_TRADING=false, HL_TESTNET=true, valid credentials</text>

  <rect x="720" y="482" width="14" height="14" rx="2" fill="#fecaca" stroke="#dc2626" stroke-width="1.2"/>
  <text x="740" y="494" font-size="9.5" fill="#24292f">MAINNET_LIVE — all 5 confirmations required</text>

  <!-- Tech stack -->
  <text x="36" y="514" font-size="9.5" fill="#57606a">Tech stack: Python 3.13 · PyTorch (CPU) · hyperliquid-python-sdk · eth-account · ccxt (OHLCV only)</text>
  <text x="36" y="528" font-size="9.5" fill="#57606a">            Flask · pytest (75 tests) · AWS EC2 · systemd · Nginx · HMAC supervisor · Telegram</text>

  <!-- Adapter note -->
  <text x="36" y="548" font-size="9.5" fill="#57606a">Exchange adapter is swappable via EXCHANGE env var — switching from Hyperliquid to Bitget is a single config change (demonstrates modular architecture).</text>
  <text x="36" y="562" font-size="9.5" fill="#57606a">Tier 2 shadow and Telegram are independent optional services; they have zero influence on the trading signal path (enforced in code).</text>

  <text x="36" y="582" font-size="9" fill="#8c959f" font-style="italic">University Final-Year Project — B.Tech · github.com/Kvy202/Ai-Trading-Bot-HQ · trading-bot.tradyai.live</text>
</svg>
